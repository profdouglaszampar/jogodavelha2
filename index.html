<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jogo da Velha Quiz</title>

<style>

body{
font-family:Arial;
background:#0E1D2E;
color:white;
text-align:center;
margin:0;
}

h1{color:#FF6400}

.screen{display:none;padding:20px}
.active{display:block}

button{
background:#FF6400;
border:none;
padding:12px 18px;
font-size:18px;
border-radius:8px;
cursor:pointer;
margin:10px;
color:white;
}

input{padding:10px;font-size:20px}

.games{
display:flex;
justify-content:center;
gap:60px;
flex-wrap:wrap;
}

.board{
display:grid;
grid-template-columns:repeat(3,120px);
gap:10px;
}

.cell{
width:120px;
height:120px;
background:white;
color:#0E1D2E;
font-size:50px;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
cursor:pointer;
}

#questionBox{
font-size:32px;
margin-bottom:20px;
}

.gapInput{
font-size:28px;
padding:6px;
width:180px;
text-align:center;
}

.correct{
color:#00ff88;
font-weight:bold;
}

.wrong{
color:#ff4d4d;
font-weight:bold;
}

.timer{
height:20px;
background:#444;
width:300px;
margin:auto;
border-radius:10px;
overflow:hidden;
}

.bar{
height:100%;
background:#FF6400;
width:100%;
transition:width 1s linear;
}

.answerBox{
font-size:26px;
margin-top:20px;
}

#winner{
font-size:50px;
color:#FF6400;
animation:pulse 1s infinite;
}

#finalWinner{
font-size:44px;
color:#FF6400;
animation:pulse 1s infinite;
line-height:1.2;
}

#finalDetails{
font-size:28px;
margin-top:20px;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

</style>
</head>

<body>

<div id="setup" class="screen active">

<h1>Jogo da Velha Quiz</h1>

<p>Enviar arquivo CSV</p>
<input type="file" id="csv">

<h3>Jogo 1</h3>
<input id="t1" placeholder="Time A">
<input id="t2" placeholder="Time B">

<h3>Jogo 2</h3>
<input id="t3" placeholder="Time C">
<input id="t4" placeholder="Time D">

<br><br>

<button onclick="startGame()">Começar</button>

</div>


<div id="game" class="screen">

<h1 id="turn"></h1>

<p>Escolha uma casa</p>

<div class="games">

<div>
<h2 id="g1"></h2>
<div id="board0" class="board"></div>
</div>

<div>
<h2 id="g2"></h2>
<div id="board1" class="board"></div>
</div>

</div>

</div>


<div id="questionScreen" class="screen">

<div id="questionBox"></div>

<div id="inputArea"></div>

<div class="timer">
<div class="bar" id="bar"></div>
</div>

<br>

<button onclick="checkAnswer()">Responder</button>

<h2 id="feedback"></h2>

<button id="continueBtn" style="display:none" onclick="continueGame()">Continuar</button>

</div>

<div id="finalScreen" class="screen">

<div id="finalWinner"></div>
<div id="finalDetails"></div>

</div>

<script>

let questions=[]
let used=[]

let teams=[]
let turn=0

let boards=[
["","","","","","","","",""],
["","","","","","","","",""]
]
let results=[null,null]

let selectedCell
let selectedBoard
let selectedIndex
let currentQuestion
let currentHasGap

let timer
let time=45

function parseCSV(text){

let rows=text.split("\n")

rows.forEach(r=>{

let parts=r.split(";")

if(parts.length>=2){

let questionText=parts[0].trim()
let answerText=parts[1].trim()

if(!questionText || !answerText) return

let isHeader=
questionText.toLowerCase()=="pergunta" &&
answerText.toLowerCase()=="resposta"

if(isHeader) return

let rawAnswers=answerText

questions.push({
q:questionText,
a:rawAnswers.split(",").map(a=>a.trim().toLowerCase()).filter(a=>a.length>0),
aDisplay:rawAnswers.split(",").map(a=>a.trim()).filter(a=>a.length>0)
})

}

})

}

function splitQuestion(q){
let match=q.match(/_{3,}/)

if(!match) return {hasGap:false,before:q,after:""}

let start=match.index
let end=start+match[0].length

return {hasGap:true,before:q.slice(0,start),after:q.slice(end)}
}

function startGame(){

let file=document.getElementById("csv").files[0]

let reader=new FileReader()

reader.onload=function(e){

parseCSV(e.target.result)

teams=[
t1.value,
t2.value,
t3.value,
t4.value
]

g1.innerText=teams[0]+" vs "+teams[1]
g2.innerText=teams[2]+" vs "+teams[3]

createBoard(0)
createBoard(1)

updateTurn()

switchScreen("game")

}

reader.readAsText(file)

}

function createBoard(i){

let board=document.getElementById("board"+i)

for(let c=0;c<9;c++){

let cell=document.createElement("div")
cell.className="cell"

cell.onclick=()=>selectCell(i,c,cell)

board.appendChild(cell)

}

}

function updateTurn(){

if(results[0] && results[1]) return

if(isGameFinished(getGameIndexForTeam(turn))){
advanceTurn()
}

let team=teams[turn%4]

let game=turn%4<2?1:2

turnText=team+" (Jogo "+game+")"

document.getElementById("turn").innerText=turnText

}

function selectCell(board,index,cell){

if(board!=(turn%4<2?0:1)) return

if(cell.innerText!="") return
if(results[board]) return

selectedCell=cell
selectedBoard=board
selectedIndex=index

showQuestion()

}

function showQuestion(){

let available=questions.filter(q=>!used.includes(q))

if(available.length==0) used=[]

currentQuestion=available[Math.floor(Math.random()*available.length)]

used.push(currentQuestion)

let parts=splitQuestion(currentQuestion.q)
currentHasGap=parts.hasGap

if(currentHasGap){
questionBox.innerHTML=
parts.before+"<input id='gapInput' class='gapInput'>"+(parts.after||"")
inputArea.innerHTML=""
}else{
questionBox.innerHTML=parts.before
inputArea.innerHTML="<input id='gapInput' class='gapInput'>"
}

feedback.innerHTML=""
continueBtn.style.display="none"

switchScreen("questionScreen")

document.getElementById("gapInput").focus()

startTimer()

}

function startTimer(){

time=45
bar.style.width="100%"

timer=setInterval(()=>{

time--

bar.style.width=(time/45*100)+"%"

if(time<=0) checkAnswer()

},1000)

}

function checkAnswer(){

clearInterval(timer)

let input=document.getElementById("gapInput")
let student=input.value.trim()
let correctList=currentQuestion.a

let parts=splitQuestion(currentQuestion.q)

let normalized=student.toLowerCase()

if(correctList.includes(normalized)){

if(currentHasGap){
questionBox.innerHTML=
parts.before+"<span class='correct'>"+student+"</span>"+(parts.after||"")
inputArea.innerHTML=""
}else{
questionBox.innerHTML=parts.before
inputArea.innerHTML="<div class='answerBox'><span class='correct'>"+student+"</span></div>"
}

feedback.innerHTML="Resposta correta."

correctMove=true

}else{

if(currentHasGap){
questionBox.innerHTML=
parts.before+"<span class='wrong'>"+student+"</span>"+(parts.after||"")
inputArea.innerHTML=""
}else{
questionBox.innerHTML=parts.before
inputArea.innerHTML="<div class='answerBox'><span class='wrong'>"+student+"</span></div>"
}

feedback.innerHTML=
"<div class='answerBox'>Gabarito: <span class='correct'>"+currentQuestion.aDisplay.join(", ")+"</span></div>"

correctMove=false

}

continueBtn.style.display="inline-block"

}

function continueGame(){

if(correctMove){

let mark=turn%2==0?"X":"O"

selectedCell.innerText=mark

boards[selectedBoard][selectedIndex]=mark

let result=checkWin(selectedBoard)

if(result){
results[selectedBoard]=result
updateGameHeader(selectedBoard)

if(results[0] && results[1]){
showFinalResults()
return
}
}

}

turn++

switchScreen("game")

updateTurn()

}

function checkWin(b){

let board=boards[b]

let wins=[
[0,1,2],[3,4,5],[6,7,8],
[0,3,6],[1,4,7],[2,5,8],
[0,4,8],[2,4,6]
]

for(let w of wins){

if(board[w[0]] &&
board[w[0]]==board[w[1]] &&
board[w[1]]==board[w[2]]){

return board[w[0]]

}

}

if(board.every(c=>c!="")) return "draw"

return null

}
function getGameIndexForTeam(teamIndex){
return teamIndex<2?0:1
}

function isGameFinished(gameIndex){
return results[gameIndex]!=null
}

function advanceTurn(){
let attempts=0

do{
turn=(turn+1)%4
attempts++
}while(attempts<5 && isGameFinished(getGameIndexForTeam(turn)))
}

function updateGameHeader(gameIndex){
let title=gameIndex==0?g1:g2
let base=gameIndex==0
?teams[0]+" vs "+teams[1]
:teams[2]+" vs "+teams[3]

let result=results[gameIndex]

if(!result){
title.innerText=base
return
}

if(result=="draw"){
title.innerText=base+" - Empate"
return
}

let winner=gameIndex==0
?(result=="X"?teams[0]:teams[1])
:(result=="X"?teams[2]:teams[3])

title.innerText=base+" - Vencedor: "+winner
}

function formatResult(gameIndex){
let result=results[gameIndex]

if(result=="draw") return "Empate"

let winner=gameIndex==0
?(result=="X"?teams[0]:teams[1])
:(result=="X"?teams[2]:teams[3])

return winner+" venceu"
}

function showFinalResults(){
let winners=[]

if(results[0]=="X") winners.push(teams[0])
if(results[0]=="O") winners.push(teams[1])
if(results[1]=="X") winners.push(teams[2])
if(results[1]=="O") winners.push(teams[3])

let message=""

if(winners.length==2){
message=winners[0]+" e "+winners[1]+" VENCERAM!"
}else if(winners.length==1){
message=winners[0]+" VENCEU!"
}else{
message="OS DOIS JOGOS EMPATARAM"
}

finalWinner.innerText=message
finalDetails.innerHTML=
"Jogo 1: "+formatResult(0)+"<br>Jogo 2: "+formatResult(1)

switchScreen("finalScreen")
}

document.addEventListener("keypress",function(e){

if(e.key==="Enter") checkAnswer()

})

function switchScreen(id){

document.querySelectorAll(".screen")
.forEach(s=>s.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

</script>

</body>
</html>
